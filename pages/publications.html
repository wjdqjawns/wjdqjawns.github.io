<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wjdqjawns_portfolio_publications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>

<body>
  <div class="site-shell">
    <aside id="topbar" data-base=".."></aside>

    <main class="page-shell">
      <header class="page-header">
        <p class="eyebrow">Publications</p>
        <h1 id="publications-title">Publications</h1>
        <p id="publications-description" class="lede">
          Domestic and international publications with dedicated detail pages.
        </p>
      </header>

      <section class="section">
        <div id="publications-container" class="stack-list"></div>
      </section>

      <footer id="footer" data-base=".."></footer>
    </main>
  </div>

  <script src="../data/publications.js"></script>
  <script src="../scripts/include.js"></script>
  <script src="../scripts/render_publications.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
